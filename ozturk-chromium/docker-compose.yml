version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ozturk-chromium_chromium_1
      APP_PORT: "6901"
      PROXY_AUTH_ADD: "false"

  chromium:
    image: kasmweb/chromium:1.18.0
    container_name: ozturk-chromium_chromium_1
    shm_size: 1gb
    environment:
      - VNC_PW= "$APP_PASSWORD"
      - APP_ARGS=--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --no-first-run --no-default-browser-check
    volumes:
      - ${APP_DATA_DIR}/config:/home/kasm-user/.config/chromium
    expose:
      - "6901"
      - "9222"
    ports:
      - "6901:6901"
      - "127.0.0.1:9222:9222"
    restart: unless-stopped