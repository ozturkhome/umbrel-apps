version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ozturk-rustfs_app_1
      APP_PORT: "9001"

  app:
    image: rustfs/rustfs:1.0.0-beta.2
    ports:
      - "9000:9000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - RUSTFS_ACCESS_KEY=umbrel
      - RUSTFS_SECRET_KEY=umbrel
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s