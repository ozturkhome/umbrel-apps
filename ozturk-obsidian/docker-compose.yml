version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: obsidian_server_1
      APP_PORT: 3000

  server:
    image: linuxserver/obsidian:1.12.7:sha256:626b18b5cd30d0786a9856bf730dee64d378ae67c0e3607bd689c6479552580e
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
    shm_size: "1gb"
